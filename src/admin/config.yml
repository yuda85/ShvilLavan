backend:
  name: git-gateway
  branch: master

media_folder: "src/images"
public_folder: "/images"

locale: "he"

publish_mode: editorial_workflow

site_url: https://shvil-lavan.co.il
display_url: https://shvil-lavan.co.il
logo_url: https://shvil-lavan.co.il/images/logo.png

collections:
  - name: "blog"
    label: "פוסטים בבלוג"
    label_singular: "פוסט"
    folder: "src/blog/posts"
    create: true
    slug: "{{slug}}"
    extension: "njk"
    format: "frontmatter"
    fields:
      - { name: "layout", label: "Layout", widget: "hidden", default: "layouts/base.njk" }
      - { name: "permalink", label: "Permalink", widget: "string", hint: "לדוגמה: /blog/my-post/index.html" }
      - { name: "title", label: "כותרת", widget: "string" }
      - { name: "description", label: "תיאור SEO (140-160 תווים)", widget: "text" }
      - { name: "keywords", label: "מילות מפתח (מופרדות בפסיקים)", widget: "string", required: false }
      - { name: "canonical", label: "Canonical URL", widget: "string", hint: "לדוגמה: https://shvil-lavan.co.il/blog/my-post/" }
      - { name: "ogImage", label: "תמונת שיתוף (OG)", widget: "image", required: false }
      - { name: "heroImage", label: "שם תמונת hero (ללא סיומת)", widget: "string", required: false, hint: "לדוגמה: hero2" }
      - { name: "date", label: "תאריך פרסום", widget: "datetime" }
      - { name: "dateModified", label: "תאריך עדכון אחרון", widget: "datetime", required: false }
      - name: "structuredData"
        label: "JSON-LD Schema (Article)"
        widget: "list"
        required: false
        fields:
          - { name: "@context", label: "Context", widget: "hidden", default: "https://schema.org" }
          - { name: "@type", label: "Type", widget: "select", options: ["Article", "BreadcrumbList", "WebPage"], default: "Article" }
          - { name: "headline", label: "Headline", widget: "string", required: false }
          - { name: "description", label: "Description", widget: "text", required: false }
          - { name: "image", label: "Image URL", widget: "string", required: false }
          - { name: "datePublished", label: "Date Published", widget: "string", required: false }
          - { name: "dateModified", label: "Date Modified", widget: "string", required: false }
      - { name: "body", label: "תוכן הפוסט (HTML)", widget: "text", hint: "ה-HTML של גוף הפוסט. עוטף ב-<article class='blog-post'>..." }

  - name: "pages"
    label: "דפי האתר"
    label_singular: "דף"
    editor:
      preview: false
    files:
      - name: "home"
        label: "דף הבית"
        file: "src/pages/index.njk"
        fields:
          - { name: "layout", label: "Layout", widget: "hidden", default: "layouts/base.njk" }
          - { name: "permalink", label: "Permalink", widget: "hidden", default: "/index.html" }
          - { name: "title", label: "כותרת הדף (SEO)", widget: "string" }
          - { name: "description", label: "תיאור SEO (140-160 תווים)", widget: "text" }
          - { name: "keywords", label: "מילות מפתח", widget: "string", required: false }
          - { name: "canonical", label: "Canonical URL", widget: "string" }
          - { name: "ogDescription", label: "תיאור OG", widget: "text", required: false }
          - { name: "ogImage", label: "תמונת שיתוף OG (URL)", widget: "string", required: false }
          - { name: "heroImage", label: "תמונת hero (שם ללא סיומת)", widget: "string", required: false }
          - { name: "structuredData", label: "JSON-LD schemas", widget: "list", required: false, field: { name: "schema", label: "Schema (JSON)", widget: "text" } }
          - name: "hero"
            label: "באנר ראשי (Hero)"
            widget: "object"
            fields:
              - { name: "image", label: "תמונה (שם ללא סיומת)", widget: "string" }
              - { name: "imageAlt", label: "תיאור תמונה (alt)", widget: "string" }
              - { name: "h1", label: "כותרת ראשית (H1)", widget: "string" }
              - { name: "subtitle", label: "תת כותרת", widget: "string" }
              - { name: "description", label: "שורת מסלולים", widget: "string" }
              - { name: "ctaPrimaryText", label: "טקסט כפתור ראשי", widget: "string" }
              - { name: "ctaPrimaryHref", label: "קישור כפתור ראשי", widget: "string" }
              - { name: "ctaSecondaryText", label: "טקסט כפתור משני", widget: "string" }
              - { name: "ctaSecondaryHref", label: "קישור כפתור משני", widget: "string" }
          - name: "services"
            label: "רצועת שירותים"
            widget: "object"
            fields:
              - { name: "title", label: "כותרת", widget: "string" }
              - name: "items"
                label: "שירותים"
                widget: "list"
                fields:
                  - { name: "title", label: "שם השירות", widget: "string" }
                  - { name: "text", label: "תיאור", widget: "string" }
                  - { name: "icon", label: "אייקון", widget: "select", options: ["truck", "layers", "coffee", "navigation", "home"] }
          - name: "heroSecondary"
            label: "באנר משני"
            widget: "object"
            fields:
              - { name: "image", label: "תמונה (שם ללא סיומת)", widget: "string" }
              - { name: "imageAlt", label: "תיאור תמונה (alt)", widget: "string" }
          - name: "gallery"
            label: "גלריה"
            widget: "object"
            fields:
              - name: "items"
                label: "פריטים"
                widget: "list"
                fields:
                  - { name: "image", label: "תמונה (שם ללא סיומת)", widget: "string" }
                  - { name: "imageAlt", label: "תיאור תמונה (alt)", widget: "string" }
                  - { name: "title", label: "כותרת", widget: "string" }
                  - { name: "text", label: "תיאור", widget: "string" }
                  - { name: "width", label: "רוחב", widget: "number", default: 1920 }
                  - { name: "height", label: "גובה", widget: "number", default: 739 }
          - name: "routes"
            label: "מסלולים"
            widget: "object"
            fields:
              - { name: "title", label: "כותרת", widget: "string" }
              - { name: "subtitle", label: "תת כותרת", widget: "string" }
              - name: "items"
                label: "מסלולים"
                widget: "list"
                fields:
                  - { name: "name", label: "שם המסלול", widget: "string" }
                  - { name: "info", label: "מידע (מרחק וכו')", widget: "string" }
                  - { name: "desc", label: "תיאור", widget: "text" }
                  - { name: "ctaText", label: "טקסט כפתור", widget: "string" }
                  - { name: "ctaHref", label: "קישור כפתור", widget: "string" }
          - name: "familyHosting"
            label: "אירוח משפחות"
            widget: "object"
            fields:
              - { name: "title", label: "כותרת", widget: "string" }
              - { name: "subtitle", label: "תת כותרת", widget: "string" }
              - { name: "paragraph1", label: "פסקה ראשונה", widget: "text" }
              - { name: "paragraph2", label: "פסקה שנייה", widget: "text" }
              - { name: "image", label: "תמונה (שם ללא סיומת)", widget: "string" }
              - { name: "imageAlt", label: "תיאור תמונה (alt)", widget: "string" }
              - name: "features"
                label: "תכונות"
                widget: "list"
                fields:
                  - { name: "icon", label: "אייקון Font Awesome", widget: "string", hint: "לדוגמה: fa-campground" }
                  - { name: "title", label: "כותרת", widget: "string" }
                  - { name: "text", label: "תיאור", widget: "string" }
              - { name: "ctaPrimaryText", label: "טקסט כפתור ראשי", widget: "string" }
              - { name: "ctaPrimaryHref", label: "קישור כפתור ראשי", widget: "string" }
              - { name: "ctaWhatsappText", label: "טקסט כפתור וואטסאפ", widget: "string" }
              - { name: "ctaWhatsappHref", label: "קישור וואטסאפ", widget: "string" }
          - name: "whyUs"
            label: "למה לבחור בנו"
            widget: "object"
            fields:
              - { name: "title", label: "כותרת", widget: "string" }
              - name: "items"
                label: "סיבות"
                widget: "list"
                fields:
                  - { name: "icon", label: "אייקון Font Awesome", widget: "string", hint: "לדוגמה: fa-shield-heart" }
                  - { name: "title", label: "כותרת", widget: "string" }
                  - { name: "text", label: "תיאור", widget: "string" }
          - name: "contact"
            label: "צרו קשר"
            widget: "object"
            fields:
              - { name: "title", label: "כותרת", widget: "string" }
              - { name: "subtitle", label: "תת כותרת", widget: "string" }
              - { name: "successTitle", label: "כותרת הצלחה", widget: "string" }
              - { name: "successText", label: "טקסט הצלחה", widget: "string" }
              - name: "routeOptions"
                label: "אפשרויות מסלול (טופס)"
                widget: "list"
                field: { name: "option", label: "מסלול", widget: "string" }
          - { name: "body", label: "תבנית (לא לערוך)", widget: "hidden" }

      - name: "services"
        label: "השירותים שלנו"
        file: "src/pages/services.njk"
        fields: &page_fields
          - { name: "layout", label: "Layout", widget: "hidden", default: "layouts/base.njk" }
          - { name: "permalink", label: "Permalink", widget: "hidden" }
          - { name: "title", label: "Title", widget: "string" }
          - { name: "description", label: "Meta description", widget: "text" }
          - { name: "keywords", label: "Meta keywords", widget: "string", required: false }
          - { name: "canonical", label: "Canonical URL", widget: "string" }
          - { name: "ogImage", label: "OG image URL", widget: "string", required: false }
          - { name: "heroImage", label: "Hero preload name", widget: "string", required: false }
          - { name: "structuredData", label: "JSON-LD schemas", widget: "list", required: false, field: { name: "schema", label: "Schema (JSON)", widget: "text" } }
          - { name: "body", label: "Body HTML", widget: "text" }

      - name: "shvil-israel"
        label: "שביל ישראל"
        file: "src/pages/shvil-israel.njk"
        fields: *page_fields

      - name: "shvil-golan"
        label: "שביל הגולן"
        file: "src/pages/shvil-golan.njk"
        fields: *page_fields

      - name: "yam-el-yam"
        label: "ים אל ים"
        file: "src/pages/yam-el-yam.njk"
        fields: *page_fields

      - name: "family-hosting"
        label: "אירוח משפחות"
        file: "src/pages/family-hosting.njk"
        fields: *page_fields

      - name: "blog-index"
        label: "דף בלוג (רשימה)"
        file: "src/pages/blog.njk"
        fields: *page_fields

  - name: "tracking"
    label: "תגיות וטראקינג"
    editor:
      preview: false
    files:
      - name: "tags"
        label: "תגיות מעקב"
        file: "src/_data/tracking.json"
        fields:
          - { name: "gaId", label: "Google Analytics ID", widget: "string", required: false, hint: "לדוגמה: G-XXXXXXXXXX" }
          - { name: "googleAdsId", label: "Google Ads ID", widget: "string", required: false, hint: "לדוגמה: AW-XXXXXXXXX" }
          - { name: "googleTagManagerId", label: "Google Tag Manager ID", widget: "string", required: false, hint: "לדוגמה: GTM-XXXXXX" }
          - { name: "googleSiteVerification", label: "Google Site Verification", widget: "string", required: false, hint: "מ-Google Search Console" }
          - { name: "facebookPixelId", label: "Facebook Pixel ID", widget: "string", required: false, hint: "מספר בלבד" }
          - { name: "extraHeadHtml", label: "HTML נוסף ל-<head>", widget: "text", required: false, hint: "כל קוד מעקב/אימות נוסף שייטמע ב-<head> של כל הדפים" }

  - name: "settings"
    label: "הגדרות כלליות"
    editor:
      preview: false
    files:
      - name: "site"
        label: "פרטי אתר"
        file: "src/_data/site.json"
        fields:
          - { name: "name", label: "שם האתר", widget: "string" }
          - { name: "url", label: "כתובת URL", widget: "string" }
          - { name: "phone", label: "טלפון (בינלאומי, למשל +972542471641)", widget: "string" }
          - { name: "phoneDisplay", label: "טלפון (תצוגה)", widget: "string" }
          - { name: "email", label: "אימייל", widget: "string" }
          - { name: "whatsapp", label: "קישור וואטסאפ", widget: "string" }
          - { name: "gaId", label: "Google Analytics ID", widget: "string" }
          - { name: "googleSiteVerification", label: "Google Site Verification", widget: "string" }
          - { name: "defaultOgImage", label: "תמונת OG ברירת מחדל", widget: "string" }
          - name: "nav"
            label: "תפריט ראשי"
            widget: "list"
            fields:
              - { name: "href", label: "קישור", widget: "string" }
              - { name: "label", label: "טקסט", widget: "string" }
          - name: "routes"
            label: "מסלולים (תפריט נפתח)"
            widget: "list"
            fields:
              - { name: "href", label: "קישור", widget: "string" }
              - { name: "label", label: "טקסט", widget: "string" }
          - name: "localBusiness"
            label: "נתוני LocalBusiness (JSON-LD)"
            widget: "object"
            fields:
              - { name: "description", label: "תיאור", widget: "text" }
              - { name: "logo", label: "URL לוגו", widget: "string" }
              - { name: "image", label: "URL תמונה", widget: "string" }
              - name: "serviceType"
                label: "סוגי שירות"
                widget: "list"
                field: { name: "service", label: "שירות", widget: "string" }
