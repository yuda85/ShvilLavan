<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>שביל לבן | הדף לא נמצא</title>
    <meta name="description" content="הדף שחיפשתם לא נמצא - חזרו לדף הבית של שביל לבן או עברו לאחד השירותים שלנו.">
    <link rel="canonical" href="https://shvillavan.netlify.app/404.html">
    <meta name="theme-color" content="#5C3A1E">

    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="apple-touch-icon" href="/images/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap&subset=hebrew" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap&subset=hebrew"></noscript>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .notfound {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background:
                linear-gradient(rgba(92, 58, 30, 0.65), rgba(92, 58, 30, 0.85)),
                url('/images/hero.jpg') center/cover no-repeat;
            color: var(--color-white);
            text-align: center;
        }
        .notfound-inner { max-width: 680px; }
        .notfound-code {
            font-size: clamp(80px, 18vw, 180px);
            font-weight: 800;
            line-height: 1;
            color: var(--color-accent);
            letter-spacing: -4px;
            margin-bottom: 8px;
        }
        .notfound h1 {
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 700;
            margin-bottom: 16px;
        }
        .notfound p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 32px;
            opacity: 0.92;
        }
        .notfound-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
        }
        .notfound-links a {
            display: inline-block;
            padding: 12px 22px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: var(--border-radius-sm);
            color: var(--color-white);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }
        .notfound-links a:hover {
            background: var(--color-accent);
            border-color: var(--color-accent);
            color: var(--color-dark);
        }
        .notfound-home {
            display: inline-block;
            padding: 14px 32px;
            background: var(--color-accent);
            color: var(--color-dark);
            border-radius: var(--border-radius-sm);
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition);
        }
        .notfound-home:hover {
            background: var(--color-accent-light);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <main class="notfound">
        <div class="notfound-inner">
            <div class="notfound-code" aria-hidden="true">404</div>
            <h1>הדף לא נמצא</h1>
            <p>נראה שיצאתם מהשביל. הדף שחיפשתם לא קיים או שהוזז למקום אחר.<br>חזרו לדף הבית או בחרו אחד מהמסלולים שלנו.</p>
            <a href="/" class="notfound-home">חזרה לדף הבית</a>
            <div class="notfound-links">
                <a href="/services/">השירותים שלנו</a>
                <a href="/shvil-israel/">שביל ישראל</a>
                <a href="/shvil-golan/">שביל הגולן</a>
                <a href="/yam-el-yam/">ים אל ים</a>
                <a href="/family-hosting/">אירוח משפחות</a>
            </div>
        </div>
    </main>
</body>
</html>
